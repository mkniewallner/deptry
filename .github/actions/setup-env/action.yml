name: 'Setup Python and Rust Environment'
description: 'Set up Python and Rust environment for the given Python version and architecture'

inputs:
  python-version:
    description: 'Python version for setup-python'
    required: true
    default: '3.12'
  target:
    description: 'Target architecture for maturin'
    required: true
    default: 'x86_64'

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      run: pipx install uv
      env:
        # renovate: datasource=pypi depName=uv
        UV_VERSION: "0.2.25"
      shell: bash

    - name: Install Python dependencies
      run: uv sync --frozen
      shell: bash

    - name: Build and install the project using Maturin
      uses: PyO3/maturin-action@v1
      with:
        target: ${{ inputs.target }}
        command: develop
        sccache: 'true'

    - name: Setup Rust toolchain
      run: rustup component add clippy rustfmt
      shell: bash
